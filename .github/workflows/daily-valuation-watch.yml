name: Daily valuation method watch

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
      timezone: "Asia/Seoul"

permissions:
  contents: write

concurrency:
  group: daily-valuation-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scan reports
        env:
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          REPORT_WATCH_URLS: ${{ vars.REPORT_WATCH_URLS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_COLLECT_UPDATES: ${{ vars.TELEGRAM_COLLECT_UPDATES }}
          TELEGRAM_SOURCE_CHAT_IDS: ${{ vars.TELEGRAM_SOURCE_CHAT_IDS }}
          TELEGRAM_UPDATES_LIMIT: ${{ vars.TELEGRAM_UPDATES_LIMIT }}
          TELEGRAM_PUBLIC_CHANNELS: ${{ vars.TELEGRAM_PUBLIC_CHANNELS }}
          TELEGRAM_PUBLIC_POSTS_LIMIT: ${{ vars.TELEGRAM_PUBLIC_POSTS_LIMIT }}
          LOOKBACK_DAYS: "2"
          MAX_REPORT_AGE_DAYS: "30"
          CONSENSUS_LIMIT: "30"
        run: python scripts/valuation_method_watch.py

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: valuation-method-watch
          path: |
            reports/*.md
            state/valuation_methods.json

      - name: Commit daily report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports state
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "chore: add daily valuation method watch"
            git pull --rebase origin main
            git push
          fi
